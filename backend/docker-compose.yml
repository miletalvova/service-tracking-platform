version: '3.8'
services:
    backend:
        build: .
        restart: unless-stopped

        ports:
            - '3000:3000'

        env_file:
            - .env.docker

        depends_on:
            db:
                condition: service_healthy

    db:
        image: mysql:8.0

        restart: unless-stopped

        environment:
            MYSQL_ROOT_PASSWORD: leta1234
            MYSQL_DATABASE: service_tracking_db

        ports:
            - '3307:3306'

        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    mysql_data:
